  # 11) Log high-risk exploit / privilege escalation topics
  - id: "log_exploit_privesc"
    applies_to: ["input"]
    type: "keyword_match"
    match:
      - "privilege escalation"
      - "privesc"
      - "token stealing"
      - "process token"
      - "DLL injection"
      - "code injection into explorer.exe"
    action: "log_only"
    severity: "medium"

  # 12) Log fictional self-harm / suicide themes
  - id: "log_self_harm_fiction"
    applies_to: ["input"]
    type: "keyword_match"
    match:
      - "end everything"
      - "kill myself"
      - "suicide note"
    action: "log_only"
    severity: "medium"
