  # 10) Database extraction - safe completion with alternatives
  - id: "safe_db_extraction"
    applies_to: ["input"]
    type: "keyword_match"
    match:
      - "extract from database"
      - "dump from database"
      - "export from postgres"
      - "extract from postgres"
      - "dump postgres"
      - "steal from database"
      - "exfil from db"
      - "data extraction script"
      - "bulk export sensitive"
      - "mass download records"
